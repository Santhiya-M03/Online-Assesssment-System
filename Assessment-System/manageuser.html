<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users</title>
    <style>
        body {
            margin: 0;
            font-family:'Times New Roman', Times, serif;
            background: #eef1f6;
        }

        

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #7c2d12;
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
        }

        .sidebar button {
            width: 100%;
            padding: 12px;
            border: none;
            background: none;
            color: white;
            text-align: left;
            cursor: pointer;
        }

        .sidebar button:hover {
            background: #ffffff;
            color: black;
        }

    

        .header {
            margin-left: 220px;
            height: 60px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 2px 5px gray;
        }

        

        .main {
            margin-left: 220px;
            padding: 20px;
        }

        

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            box-shadow: 0 0 5px gray;
        }

        th,td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #7c2d12;
            color: white;
        }

        button.delete {
            background: red;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>

</head>

<body>
    

    <div class="sidebar">
        <h2>👨‍💼 Admin</h2>
        <button onclick="dashboard()">⬅️ Back</button>
    </div>



    <div class="header">
        <h3>Manage Users</h3>
    </div>



    <div class="main">
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="userTable"></tbody>
        </table>
    </div>

    <script>

        let user = JSON.parse(localStorage.getItem("loggedUser"));
        if (!user || user.role !== "admin") {
            window.location.href = "login.html";
        }

        let users = JSON.parse(localStorage.getItem("users")) || [];
        let table = document.getElementById("userTable");

        function loadUsers() {
            table.innerHTML = "";

            users.forEach((u, i) => { table.innerHTML += 
                `<tr> 
                    <td>${u.username}</td>
                    <td>${u.email}</td>
                    <td>${u.role}</td>
                    <td> <button class="delete" onclick="deleteUser(${i})"> Delete </button> </td>
                </tr> `;
            });

        }

        function deleteUser(i) {
            users.splice(i, 1);
            localStorage.setItem("users", JSON.stringify(users));
            loadUsers();
        }

        function dashboard() {
            window.location.href = "admindb.html";
        }
        loadUsers();
    </script>
</body>

</html>
