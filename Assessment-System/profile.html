<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
   
    <link rel="icon" href="images/dashboard.png">
    <style>
        body {
            margin: 0;
            font-family: 'Times New Roman', Times, serif;
            background: #eef1f6;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #7c2d12;
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
        }

        .sidebar button {
            width: 100%;
            padding: 12px;
            border: none;
            background: none;
            color: white;
            text-align: left;
            cursor: pointer;
        }

        .sidebar button:hover {
            background: white;
            color: black;
        }

        .header {
            margin-left: 220px;
            height: 60px;
            background: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 2px 5px gray;
        }

        .main {
            margin-left: 220px;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .card {
            width: 400px;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .card h2 {
            margin-top: 0;
            color: #7c2d12;
        }

        .info {
            margin: 10px 0;
            font-size: 16px;
        }

        .btn {
            padding: 10px 20px;
            margin-top: 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .edit {
            background: #2563eb;
            color: white;
        }

        .logout {
            background: #dc2626;
            color: white;
        }

        .btn:hover {
            opacity: 0.8;
        }

        input {
            padding: 8px;
            width: 90%;
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">
        <h2>👤 Profile</h2>
        <button onclick="dashboard()">⬅️ Back</button>
    </div>


    <!-- HEADER -->

    <div class="header">
        <h3>User Profile</h3>
    </div>


    <!-- MAIN -->

    <div class="main">
        <div class="card">
            <h2>Profile</h2>
            <div class="info">
                Name : <span id="name"></span>
            </div>
            <div class="info">
                Email : <span id="email"></span>
            </div>
            <div class="info">
                Role : <span id="role"></span>
            </div>
            <!-- EDIT BOX -->
            <div id="editBox" style="display:none; margin-top:10px;">
                <input id="editName" placeholder="Name">
                <br><br>
                <input id="editEmail" placeholder="Email">
                <br><br>
                <button onclick="saveProfile()">Save</button>
            </div>
            <button class="btn edit" onclick="editProfile()">
                Edit
            </button>
            <button class="btn logout" onclick="logout()">
                Logout
            </button>
        </div>
    </div>
    <script>
        let user = JSON.parse(localStorage.getItem("loggedUser"));
        if (user) {

            document.getElementById("name").innerText = user.username || user.name || "";

            document.getElementById("email").innerText = user.email || user.mail || "";

            document.getElementById("role").innerText = user.role || "";
        }
        function dashboard() {
            let user = JSON.parse(localStorage.getItem("loggedUser"));
            if (!user) {
                location.href = "login.html";
                return;
            }
            if (user.role == "student")
                location.href = "studentdb.html";
            else if (user.role == "teacher")
                location.href = "teacherdb.html";
            else
                location.href = "admindb.html";

        }


        function editProfile() {

            document.getElementById("editBox").style.display = "block";

            let user = JSON.parse(localStorage.getItem("loggedUser"));

            document.getElementById("editName").value =
                user.username || user.name || "";

            document.getElementById("editEmail").value =
                user.email || user.mail || "";

        }

        function saveProfile() {
            let user = JSON.parse(localStorage.getItem("loggedUser"));
            user.username = document.getElementById("editName").value;
            user.email = document.getElementById("editEmail").value;
            localStorage.setItem(
                "loggedUser",
                JSON.stringify(user)
            );

            location.reload();
        }
        function logout() {
            localStorage.removeItem("loggedUser");
            location.href = "login.html";
        }

    </script>

</body>

</html>
