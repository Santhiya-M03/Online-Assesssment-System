<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Login</title>
    <link rel="icon" href="images/icon.png">
    
    
    <style>
        body {
            margin: 0;
            font-family: 'Times New Roman', Times, serif;
            height: 100vh;
            background: url("images/bg.jpg") no-repeat center center/cover;
            display: flex;
        }

        

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .left {
            width: 50%;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            z-index: 1;

        }

        .left h1 {
            font-size: 45px;
            margin: 0;
        }

        .left p {
            max-width: 400px;
            text-align: center;
        }

        .features {
            margin-top: 20px;
        }

        .features p {
            margin: 5px;
        }

        .right {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;

        }

        

        .loginBox {
            width: 350px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 15px black;
            color: white;
        }

        

        .inputBox {
            position: relative;
            margin-bottom: 15px;
        }

        .inputBox i {
            position: absolute;
            top: 10px;
            left: 10px;
        }

        .inputBox input {
            width: 310px;
            padding: 10px 10px 10px 30px;
            border: none;
            outline: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        

        button {
            width: 100%;
            padding: 10px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1e40af;
        }

        

        .options {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .link {
            text-align: center;
            margin-top: 10px;
        }

        .link a {
            color: white;
            text-decoration: none;
        }

        .brand {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .brand h1 {
            font-size: 38px;
            margin: 0;
        }

        .tag {
            font-size: 18px;
            margin: 5px 0;
        }

        .sub {
            font-size: 13px;
            opacity: 0.8;
        }

        
       
    </style>
</head>

<body>
      

    <div class="left">
        <div class="brand">
            <h1>Assessment</h1>
            <p class="tag">
                Welcome 
            </p>
            <p class="sub">
                Sign in to your account to continue
            </p>
        </div>
    </div>

    <div class="right">
        <div class="loginBox">
            <h2>Login</h2>
            <div class="inputBox">
                <i class="fa fa-envelope"></i>
                <input id="email" placeholder="Email">
            </div>

            <div class="inputBox">
                <i class="fa fa-lock"></i>
                <input id="password" type="password" placeholder="Password">
            </div>

            <div class="options">
                <label>
                    <input type="checkbox" onclick="showPass()"> Show </label>
            </div>
            <button onclick="login()"> Login </button>

            <div class="link">
                <a href="register.html"> Register </a>
            </div>

        </div>
    </div>

    <script>

        function showPass() {
            let p = document.getElementById("password");

            if (p.type === "password")
                p.type = "text";
            else
                p.type = "password";
        }

        function login() {

            let email = document.getElementById("email").value;
            let pass = document.getElementById("password").value;
            let users = JSON.parse(localStorage.getItem("users")) || [];
            let found = users.find(u => u.email === email && u.password === pass);

            if (!found) {
                alert("Invalid login");
                return;
            }
            localStorage.setItem("loggedUser", JSON.stringify(found));

            localStorage.removeItem("round1Pass");
            localStorage.removeItem("round2Pass");
            localStorage.removeItem("level");
            localStorage.removeItem("score");
            localStorage.removeItem("total");

            if (found.role === "admin")
                location.href = "admindb.html";
            else if (found.role === "teacher")
                location.href = "teacherdb.html";
            else
                location.href = "studentdb.html";
        }
        function logout() {

            localStorage.removeItem("loggedUser");

            localStorage.removeItem("round1Pass");
            localStorage.removeItem("round2Pass");
            localStorage.removeItem("level");
            localStorage.removeItem("score");
            localStorage.removeItem("total");

            location.href = "login.html";

        }
    </script>
</body>

</html>
