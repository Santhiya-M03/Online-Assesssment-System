<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>student</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #eef1f6;
        }

        /* SIDEBAR */

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #7c2d12;
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
        }

        .sidebar button {
            width: 100%;
            padding: 12px;
            border: none;
            background: none;
            color: white;
            text-align: left;
            cursor: pointer;
        }

        .sidebar button:hover {
            background: #ffffff;
            color: black;
        }

        /* MAIN */

        .main {
            margin-left: 220px;
            padding: 20px;
        }

        /* TABLE */

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #7c2d12;
            color: white;
        }

        .addBtn {
            margin-bottom: 10px;
            padding: 8px 12px;
            background: green;
            color: white;
            border: none;
        }

        .deleteBtn {
            background: red;
            color: white;
            border: none;
            padding: 5px 10px;
        }
    </style>
</head>

<body>
    <!-- SIDEBAR -->

    <div class="sidebar">
        <h2>Admin</h2>
        <button onclick="go('admindb.html')">⬅️Back</button>
    </div>

    <!-- MAIN -->

    <div class="main">
        <h2>Students</h2>
        <button class="addBtn" onclick="addStudent()"> Add Student </button>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>

    <script>

        let users = JSON.parse(localStorage.getItem("users")) || [];
        let list = document.getElementById("list");

        function load() {
            list.innerHTML = "";
            users.forEach((u, i) => {
                if (u.role === "student") {
                    list.innerHTML +=
                        `<tr>
                        <td>${u.username}</td>
                        <td>${u.email}</td>
                        <td> <button class="deleteBtn" onclick="del(${i})"> Delete </button> </td>
                    </tr>`;
                }
            });
        }
        function addStudent() {

            let name = prompt("Enter name");
            let email = prompt("Enter email");
            let pass = prompt("Enter password");
            if (!name || !email || !pass) return;
            users.push({
                username: name,
                email: email,
                password: pass,
                role: "student"
            });

            localStorage.setItem("users",
                JSON.stringify(users)
            );

            load();
        }

        function del(i) {
            users.splice(i, 1);
            localStorage.setItem("users", JSON.stringify(users));
            load();
        }

        function go(p) {
            location.href = p;
        }
        load();
    </script>
</body>

</html>
