<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Quiz</title>
    <link rel="icon" href="images/ideas.png">

    <style>
        body {
            margin: 0;
            font-family: 'Times New Roman', Times, serif;
            background: #eef1f6;
        }

        

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #7c2d12;
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
        }

        

        .main {
            margin-left: 220px;
            padding: 30px;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }


        .card {

            width: 650px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);

        }

        #questionCount {
            font-weight: bold;
            margin-bottom: 10px;
        }

        #question {
            margin-bottom: 15px;
        }

        

        .answers button {

            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border: none;
            background: #f1f5f9;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;

        }

        .answers button:hover {
            background: #e2e8f0;
        }

        

        .answers button.selected {
            background: #2563eb;
            color: white;
        }

        

        .next {
            padding: 8px 18px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 5px;
        }

        #prevBtn {
            padding: 8px 18px;
            cursor: pointer;
        }

        

        .palette {

            width: 220px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);

            display: flex;
            flex-wrap: wrap;
            justify-content: center;

        }

        .palette button {

            width: 40px;
            height: 40px;
            margin: 5px;
            border: none;
            background: #e5e7eb;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;

        }

    

        .palette .done {
            background: #16a34a;
            color: white;
        }

        

        .palette .current {
            background: #2563eb;
            color: white;
        }
    </style>

</head>

<body>

    <div class="sidebar">
        <h2>Exam</h2>
    </div>


    <div class="main">

        <div class="card">

            <div id="questionCount"></div>

            <h3 id="question"></h3>

            <div id="answers" class="answers"></div>

            <button id="prevBtn">Prev</button>
            <button id="nextBtn" class="next">Next</button>

            <div id="timer"></div>

        </div>


        <div class="palette" id="palette"></div>

    </div>


    <script src="js/quiz.js"></script>

</body>

</html>
